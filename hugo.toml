baseURL = 'https://ylee-101.github.io/'
locale = 'ko-KR'
title = 'ylee-101'
theme = 'hugo-theme-cleanwhite'
preserveTaxonomyNames = true
hasCJKLanguage = true

[pagination]
  pagerSize = 5

[outputs]
  home = ['html', 'rss', 'searchindex']

[outputFormats.searchindex]
  mediaType = 'application/json'
  baseName = 'search-index'
  isPlainText = true
  notAlternative = true

[params]
  header_image = 'img/home-bg-jeep.jpg'
  SEOTitle = 'ylee-101'
  description = '개발하면서 배운 것과 기록해둘 만한 생각을 정리하는 블로그입니다.'
  keyword = 'ylee-101, blog, hugo, github pages'
  slogan = '기록하고 다시 읽기'
  image_404 = 'img/404-bg.jpg'
  title_404 = '페이지를 찾을 수 없습니다'
  omit_categories = true
  page_view_counter = false
  algolia_search = false
  reward = false
  friends = false
  bookmarks = false
  about_me = false
  featured_tags = true
  featured_condition_size = 0
  sidebar_about_description = '개발 기록과 개인 블로그'
  dark_mode_toggle = true
  custom_css = ['css/custom.css']

  [params.social]
    rss = true
    github = 'https://github.com/ylee-101'
